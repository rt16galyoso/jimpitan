<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jimpitan RT 16</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; padding: 20px; font-size: 18px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; font-size: 24px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 15px; box-sizing: border-box; border: 2px solid #bdc3c7; border-radius: 8px; font-size: 18px; }
        input:focus, select:focus { border-color: #3498db; outline: none; }
        .btn { width: 100%; background: #2ecc71; color: white; padding: 18px; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { background: #27ae60; }
        #preview { width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px; display: none; margin-top: 10px; border: 2px dashed #bdc3c7; }
        #success-screen { display: none; text-align: center; padding: 40px 20px; }
        .success-icon { font-size: 60px; color: #2ecc71; }
    </style>
</head>
<body>

<div class="container" id="app-container">
    <div id="form-view">
        <h2>LAPOR JIMPITAN RT 16</h2>
        <form id="jimpitanForm">
            <div class="form-group">
                <label>1. Nama Petugas</label>
                <input type="text" id="petugas" required placeholder="Ketik nama Anda">
            </div>
            <div class="form-group">
                <label>2. Jumlah Jimpitan (Rp)</label>
                <input type="text" id="nominal_display" required placeholder="Contoh: 50.000">
                <input type="hidden" id="nominal_raw">
            </div>
            <div class="form-group">
                <label>3. Foto Hasil Jimpitan</label>
                <input type="file" id="foto" accept="image/*" capture="environment" required>
                <img id="preview" alt="Pratinjau Foto">
            </div>
            <div class="form-group">
                <label>4. PIN RT (Keamanan)</label>
                <input type="password" id="pin" pattern="[0-9]*" inputmode="numeric" required placeholder="4 digit PIN">
            </div>
            <button type="submit" class="btn" id="submitBtn">KIRIM LAPORAN</button>
        </form>
    </div>

    <div id="success-screen">
        <div class="success-icon">✓</div>
        <h2 style="color: #2ecc71;">LAPORAN BERHASIL!</h2>
        <p>Data jimpitan sudah tercatat di kas RT. Terima kasih atas tugasnya hari ini.</p>
        <button class="btn" style="background: #3498db;" onclick="window.location.reload()">Lapor Lagi</button>
    </div>
</div>

<script>
    const GAS_URL = "MASUKKAN_URL_WEB_APP_GAS_ANDA_DI_SINI";
    const nominalDisplay = document.getElementById('nominal_display');
    const nominalRaw = document.getElementById('nominal_raw');
    const fotoInput = document.getElementById('foto');
    const preview = document.getElementById('preview');
    let base64Image = "";

    // Format Otomatis Rupiah saat mengetik
    nominalDisplay.addEventListener('input', function(e) {
        let value = this.value.replace(/\D/g, "");
        nominalRaw.value = value;
        this.value = value ? new Intl.NumberFormat('id-ID').format(value) : "";
    });

    // Ambil Gambar dan Kompresi Otomatis di Sisi Klien (Client-Side)
    fotoInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                // Set batas resolusi maksimal untuk menghemat ukuran file
                const max_width = 800;
                let width = img.width;
                let height = img.height;

                if (width > max_width) {
                    height = Math.round((height * max_width) / width);
                    width = max_width;
                }

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // Kompresi kualitas gambar ke JPEG 70% (Ukuran menyusut drastis menjadi ~100kb)
                base64Image = canvas.toDataURL('image/jpeg', 0.7);
                preview.src = base64Image;
                preview.style.display = 'block';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Proses Submit (Menerapkan Optimistic UI)
    document.getElementById('jimpitanForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const payload = {
            petugas: document.getElementById('petugas').value,
            nominal: nominalRaw.value,
            image: base64Image,
            pin: document.getElementById('pin').value
        };

        // Teknik Optimistic UI: Tampilkan layar sukses langsung agar lansia tidak menunggu loading lama
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('success-screen').style.display = 'block';

        // Proses pengiriman berjalan asinkronus di latar belakang
        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', // Menghindari kendala CORS di Google Apps Script
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => console.log("Data berhasil terkirim ke latar belakang"))
        .catch(err => alert("Terjadi gangguan pengiriman, harap hubungi admin: " + err));
    });
</script>
</body>
</html>
