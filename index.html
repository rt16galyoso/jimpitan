<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jimpitan RT 16</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981; /* Hijau modern */
            --primary-dark: #059669;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-light: #e5e7eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 40px; }

        /* Header bergaya aplikasi native */
        .app-header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .app-header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
        .app-header p { font-size: 13px; opacity: 0.9; margin-top: 4px; font-weight: 400; }

        .container {
            max-width: 500px;
            margin: 24px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .form-group { margin-bottom: 24px; position: relative; }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        /* Input ala iOS/Material Design */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 16px;
            background: #f9fafb;
            border: 2px solid var(--border-light);
            border-radius: 12px;
            font-size: 18px;
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        input::placeholder { color: #9ca3af; }

        /* Area Kamera Interaktif */
        .upload-area {
            display: block;
            background: #f0fdf4;
            border: 2px dashed var(--primary);
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .upload-area:active { background: #dcfce7; }
        .upload-area input[type="file"] { display: none; }
        
        .upload-icon {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            margin-bottom: 12px;
        }
        .upload-icon svg { width: 32px; height: 32px; }
        .upload-text { font-size: 16px; font-weight: 600; color: var(--primary-dark); }
        .upload-subtext { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

        /* Pratinjau Foto */
        #preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            display: none;
            margin-top: 16px;
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Tombol Utama */
        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            transition: transform 0.1s, background 0.2s;
        }
        .btn-submit:active { transform: scale(0.98); background: var(--primary-dark); }

        /* Layar Sukses (Optimistic UI) */
        #success-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .success-circle {
            width: 80px; height: 80px;
            background: #dcfce7;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
        }
        .success-circle svg { width: 40px; height: 40px; color: var(--primary); }
        #success-screen h2 { color: var(--text-main); font-size: 24px; margin-bottom: 12px; }
        #success-screen p { color: var(--text-muted); font-size: 16px; line-height: 1.5; margin-bottom: 30px; }
        .btn-secondary { background: #f3f4f6; color: var(--text-main); box-shadow: none; border: 1px solid var(--border-light); }

        /* Bottom Navigation */
.bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white; border-top: 1px solid var(--border-light);
    display: flex; justify-content: space-around;
    padding-bottom: env(safe-area-inset-bottom); /* Aman untuk iPhone */
    z-index: 1000; box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
}
.nav-item {
    flex: 1; text-align: center; padding: 12px 0;
    color: var(--text-muted); font-size: 12px; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.nav-item.active { color: var(--primary); }
.nav-item svg { width: 24px; height: 24px; }

/* Filter Pills */
.filter-container {
    display: flex; gap: 10px; overflow-x: auto; padding: 10px 0;
    scrollbar-width: none;
}
.filter-pill {
    background: #f3f4f6; border: 1px solid #d1d5db;
    padding: 8px 16px; border-radius: 20px; font-size: 14px;
    white-space: nowrap; font-weight: 600; color: var(--text-main);
}
.filter-pill.active { background: var(--primary); color: white; border-color: var(--primary); }

/* History Card */
.history-card {
    background: white; border-radius: 12px; padding: 16px;
    margin-bottom: 12px; border: 1px solid var(--border-light);
    display: flex; justify-content: space-between; align-items: center;
}
.history-info p { margin: 0; }
.history-date { font-size: 12px; color: var(--text-muted); }
.history-name { font-size: 16px; font-weight: 700; margin: 4px 0; }
.history-amount { font-size: 18px; font-weight: 700; color: var(--primary); }
.btn-edit { background: none; border: none; color: #f59e0b; padding: 8px; cursor: pointer; }

/* Modal Edit */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;
}
.modal-content { background: white; padding: 24px; border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <header class="app-header">
        <h1>DATA JIMPITAN RT 16</h1>
        <p>Tegalyoso, Klaten</p>
    </header>

    <div class="container" id="page-lapor">
   </div>

<div class="container" id="page-riwayat" style="display: none;">
    <div class="filter-container">
        <div class="filter-pill active" onclick="setFilter('semua')">Semua Waktu</div>
        <div class="filter-pill" onclick="setFilter('bulan')">Bulan Ini</div>
        <div class="filter-pill" onclick="setFilter('hari')">Hari Ini</div>
    </div>
    
    <div id="history-list" style="margin-top: 16px;">
        <p style="text-align: center; color: gray;">Memuat data...</p>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" id="nav-lapor" onclick="switchPage('lapor')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
        Lapor
    </div>
    <div class="nav-item" id="nav-riwayat" onclick="switchPage('riwayat')">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        Riwayat
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-content">
        <h3 style="margin-bottom: 16px;">Koreksi Laporan</h3>
        <input type="hidden" id="edit-baris">
        <div class="form-group">
            <label>Nominal Seharusnya (Rp)</label>
            <input type="number" id="edit-nominal" class="input-modern" placeholder="Cth: 50000">
        </div>
        <div class="form-group">
            <label>PIN RT</label>
            <input type="password" id="edit-pin" class="input-modern" placeholder="Masukkan PIN">
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-submit" style="background: #ef4444;" onclick="closeModal()">Batal</button>
            <button class="btn-submit" onclick="simpanEdit()">Simpan</button>
        </div>
    </div>
</div>

<script>
    // JANGAN LUPA: Ganti teks di bawah ini dengan URL GAS Anda yang asli
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzyBqlnkincqHI-MRGMeDJ-O7MQ28KinPZqijEIhX07J1ab-KcIKNMhq6gqu3F6fXiLBg/exec";
    
    const nominalDisplay = document.getElementById('nominal_display');
    const nominalRaw = document.getElementById('nominal_raw');
    const fotoInput = document.getElementById('foto');
    const preview = document.getElementById('preview');
    const uploadLabel = document.getElementById('upload-label');
    let base64Image = "";

    nominalDisplay.addEventListener('input', function(e) {
        let value = this.value.replace(/\D/g, "");
        nominalRaw.value = value;
        this.value = value ? new Intl.NumberFormat('id-ID').format(value) : "";
    });

    fotoInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const max_width = 800;
                let width = img.width;
                let height = img.height;

                if (width > max_width) {
                    height = Math.round((height * max_width) / width);
                    width = max_width;
                }

                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                base64Image = canvas.toDataURL('image/jpeg', 0.7);
                
                // Ubah UI setelah foto diambil
                preview.src = base64Image;
                preview.style.display = 'block';
                uploadLabel.style.display = 'none'; // Sembunyikan tombol kamera setelah ada foto
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Pratinjau bisa diklik untuk foto ulang
    preview.addEventListener('click', () => {
        fotoInput.click();
    });

    document.getElementById('jimpitanForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const payload = {
            petugas: document.getElementById('petugas').value,
            nominal: nominalRaw.value,
            image: base64Image,
            pin: document.getElementById('pin').value
        };

        document.getElementById('form-view').style.display = 'none';
        document.getElementById('success-screen').style.display = 'block';
        window.scrollTo(0, 0);

        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => console.log("Data berhasil terkirim"))
        .catch(err => alert("Terjadi gangguan: " + err));
    });
    // Navigasi Antar Halaman
function switchPage(page) {
    document.getElementById('page-lapor').style.display = page === 'lapor' ? 'block' : 'none';
    document.getElementById('page-riwayat').style.display = page === 'riwayat' ? 'block' : 'none';
    
    document.getElementById('nav-lapor').classList.toggle('active', page === 'lapor');
    document.getElementById('nav-riwayat').classList.toggle('active', page === 'riwayat');

    if(page === 'riwayat') muatRiwayat();
}

// Fungsi Tarik Data Riwayat (GET)
let dataRiwayatGlobal = [];
function muatRiwayat() {
    document.getElementById('history-list').innerHTML = '<p style="text-align: center; color: gray;">Memuat data mutakhir...</p>';
    fetch(GAS_URL)
        .then(res => res.json())
        .then(data => {
            dataRiwayatGlobal = data;
            renderRiwayat(dataRiwayatGlobal);
        })
        .catch(err => {
            document.getElementById('history-list').innerHTML = '<p style="color: red;">Gagal memuat data.</p>';
        });
}

// Fungsi Menampilkan Riwayat ke Layar
function renderRiwayat(data) {
    const container = document.getElementById('history-list');
    container.innerHTML = '';
    
    data.forEach(item => {
        container.innerHTML += `
            <div class="history-card">
                <div class="history-info">
                    <div class="history-date">${item.waktu}</div>
                    <div class="history-name">${item.petugas}</div>
                    <div class="history-amount">Rp ${new Intl.NumberFormat('id-ID').format(item.nominal)}</div>
                </div>
                <button class="btn-edit" onclick="bukaModalEdit(${item.baris}, ${item.nominal})">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                </button>
            </div>
        `;
    });
}

// Logika Edit Modal
function bukaModalEdit(baris, nominalLama) {
    document.getElementById('edit-baris').value = baris;
    document.getElementById('edit-nominal').value = nominalLama;
    document.getElementById('editModal').style.display = 'flex';
}
function closeModal() { document.getElementById('editModal').style.display = 'none'; }

function simpanEdit() {
    const payload = {
        action: "edit",
        baris: document.getElementById('edit-baris').value,
        nominal_baru: document.getElementById('edit-nominal').value,
        pin: document.getElementById('edit-pin').value
    };

    closeModal();
    document.getElementById('history-list').innerHTML = '<p style="text-align: center; color: var(--primary);">Menyimpan perubahan...</p>';

    fetch(GAS_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    }).then(() => {
        setTimeout(muatRiwayat, 1500); // Reload data setelah diedit
    });
}
</script>
</body>
</html>
